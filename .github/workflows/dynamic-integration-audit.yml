name: Auditoría Dinámica — FASE 3F (Integración E2E)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/cancharios-stats-audit-0pnx4q
    paths:
      - 'apps/api/stats-engine-r/**'
      - 'apps/web/src/**'
      - 'apps/api/src/**'
      - 'tests/audit_build.R'
      - 'tests/audit_integration_r.R'
      - 'tests/audit_event_level_e2e.R'
      - 'tests/audit_ordered_levels_e2e.R'
      - 'tests/audit_mediation_e2e.R'
      - 'tests/audit_word_real.R'
      - 'tests/audit_security_dynamic.R'
      - 'tests/audit_concurrency_temps.R'

# No deploy, no build de produccion — solo validacion E2E en rama de auditoria
jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: Build TypeScript — Frontend + Backend
  # ══════════════════════════════════════════════════════════════════════════
  build-typescript:
    name: Build TypeScript (Frontend + Backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type-check API
        working-directory: apps/api
        run: npx prisma generate && npx tsc --noEmit

      - name: Type-check Web
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Build Web
        working-directory: apps/web
        run: npm run build

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: Suites R dinamicas (Y–AF)
  # ══════════════════════════════════════════════════════════════════════════
  dynamic-r-suites:
    name: Suites R dinamicas Y–AF
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r-version: ['4.3.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R ${{ matrix.r-version }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true

      - name: Cache paquetes R
        uses: actions/cache@v4
        id: cache-r-pkgs
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ matrix.r-version }}-dynamic-v1-${{ hashFiles('apps/api/stats-engine-r/install_packages.R') }}
          restore-keys: |
            r-${{ matrix.r-version }}-dynamic-v1-

      - name: Instalar paquetes R (base)
        if: steps.cache-r-pkgs.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e '
            pkgs <- c("MASS", "nnet", "jsonlite", "dplyr", "openxlsx",
                      "seminr", "psych", "lavaan", "nortest", "emmeans",
                      "car", "officer")
            installed <- rownames(installed.packages())
            to_install <- pkgs[!pkgs %in% installed]
            if (length(to_install) > 0) {
              install.packages(to_install,
                repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest",
                Ncpus = 2L)
            }
            for (p in pkgs) {
              cat(sprintf("  %s: %s\n", p, if (requireNamespace(p, quietly=TRUE)) "OK" else "FALTA"))
            }
          '

      - name: Crear directorio de salida
        shell: bash
        run: mkdir -p dynamic-audit-output

      # ── Suite Y — Build & Contratos ──
      - name: "[Y] Build & contratos de archivos R"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          Rscript tests/audit_build.R 2>&1 | tee dynamic-audit-output/Y-build.txt

      # ── Suite Z — Integracion R E2E ──
      - name: "[Z] Integracion R end-to-end (9 metodos)"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          Rscript tests/audit_integration_r.R 2>&1 | tee dynamic-audit-output/Z-integration-r.txt

      # ── Suite AA — event_level E2E ──
      - name: "[AA] event_level E2E (logistica binaria)"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          Rscript tests/audit_event_level_e2e.R 2>&1 | tee dynamic-audit-output/AA-event-level.txt

      # ── Suite AB — ordered_levels E2E ──
      - name: "[AB] ordered_levels E2E (regresion ordinal)"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          Rscript tests/audit_ordered_levels_e2e.R 2>&1 | tee dynamic-audit-output/AB-ordered-levels.txt

      # ── Suite AC — mediacion E2E ──
      - name: "[AC] Mediacion E2E (simple + serial guard)"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          Rscript tests/audit_mediation_e2e.R 2>&1 | tee dynamic-audit-output/AC-mediation.txt

      # ── Suite AD — Word real con officer ──
      - name: "[AD] Generacion Word real (officer)"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          Rscript tests/audit_word_real.R 2>&1 | tee dynamic-audit-output/AD-word-real.txt

      # ── Suite AE — Seguridad dinamica ──
      - name: "[AE] Seguridad dinamica (inyeccion, NaN, vacios)"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          Rscript tests/audit_security_dynamic.R 2>&1 | tee dynamic-audit-output/AE-security.txt

      # ── Suite AF — Concurrencia y temps ──
      - name: "[AF] Concurrencia y archivos temporales"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          Rscript tests/audit_concurrency_temps.R 2>&1 | tee dynamic-audit-output/AF-concurrency.txt

      # ── Resumen de todas las suites ──
      - name: Resumen dinamico de suites Y–AF
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "=== RESUMEN SUITES DINAMICAS Y–AF ==="
          for f in dynamic-audit-output/*.txt; do
            suite=$(basename "$f" .txt)
            pass=$(grep -c "^\s*\[PASS\]" "$f" 2>/dev/null || echo 0)
            fail=$(grep -c "^\s*\[FAIL\]" "$f" 2>/dev/null || echo 0)
            skip=$(grep -c "^\s*\[SKIP\]" "$f" 2>/dev/null || echo 0)
            echo "  $suite: PASS=$pass FAIL=$fail SKIP=$skip"
          done
          total_fail=$(grep -rh "^\s*\[FAIL\]" dynamic-audit-output/ 2>/dev/null | wc -l || echo 0)
          echo ""
          if [ "$total_fail" -gt 0 ]; then
            echo "TOTAL FAIL: $total_fail"
            exit 1
          else
            echo "TODAS LAS SUITES: OK"
          fi

      - name: Upload artefactos de auditoria dinamica
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-audit-results-r${{ matrix.r-version }}
          path: dynamic-audit-output/
          retention-days: 30
